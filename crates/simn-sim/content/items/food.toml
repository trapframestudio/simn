# Noosphere item catalog. Loaded by `ItemRegistry::load` via
# `include_str!` at compile-time. Keep IDs stable — saves reference
# them. Numbers are tunable, not committed contracts.
#
# Schema: see `crates/simn-sim/src/items.rs`.
#
# Time units for `perishable_ticks`: 20Hz sim, so 20 ticks = 1
# real-world second. `WorldTime::DEFAULT_DAY_LENGTH = 7200` in-world
# seconds per in-world day (12× compression), so 1 in-world hour =
# 300 in-world seconds ≈ 6000 ticks at the current compression. A
# 24-in-world-hour perishable is 144000 ticks.

