# ---------- Loot Pools (Phase 3B) ----------
#
# Faction × depth_tier × family pool tables. One pool per tuple;
# entries inside a pool list (item_id, weight, count_min,
# count_max). Pool resolution rolls a single entry weighted by
# `weight`, then picks a stack size uniformly in `[count_min,
# count_max]`.
#
# Container content generation (Phase 3C — first-approach roll):
# pick a family weighted by the container kind's `family_weights`
# (in `loot_containers.toml`), then pick a faction = the region's
# controlling faction (with influence-mix coming later per
# loot-and-economy-plan §3.2), then pick a depth_tier = the
# region's authored tier (defaults to 1 until tiers are wired),
# then look up the pool and roll.
#
# Fallback chain in `LootPoolRegistry`:
#   (faction, tier, family) → (faction, 1, family) →
#   ("wanderers", tier, family) → ("wanderers", 1, family) → empty
#
# `wanderers` is the neutral catch-all so any region with an
# unknown faction still rolls plausible scavenger loot.
#
# This file ships with surface tier (1) coverage for four
# factions plus wanderers. Interior (2) and deep (3) tiers, plus
# the rest of the faction roster, land as zones are authored.

