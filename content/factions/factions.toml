# Example faction registry (generic). Demonstrates the schema; ships
# with SIMN so the sim runs standalone. A consuming game overrides
# this file (and chatter/names) via a ContentSource overlay.
#
# Keys, relations, archetypes, and nationality weights are mechanical
# and reusable; display strings are derived from the key.

default_relation = "neutral"
player_baseline = "nomads"

[[faction]]
name = "coalition"
display = "Coalition"
road_friendly = true
base_aggression = 0.60
default_loadout = "coalition_basic"
debug_color = [0xCC, 0xCC, 0x33]
archetype = "disciplined"
squad_size = { min = 4, max = 5 }
combat = { shoot = 1.5, advance = 4.5, move_to_cover = 0.8, peek = 0.8, flank = 2.5, suppress = 1.5, retreat = 5.0, reload = 1.5, heal_ally = 1.5 }
base_kinds = [ { kind = "Checkpoint", weight = 5 }, { kind = "Outpost", weight = 3 }, { kind = "Headquarters", weight = 1 } ]
[faction.nationality_weights]
american = 8
east_asian = 3
latin_american = 3
western_european = 2
slavic = 1
south_asian = 1
west_african = 1
middle_eastern = 1

