# NPC loadouts — what a freshly spawned NPC carries in their pockets.
#
# Keyed by faction (snake_case, see `faction_to_str`). Each loadout is
# a list of rolls. A roll with `chance = 1.0` always grants; lower
# chances roll once per spawn against the squad RNG.
#
# These are deliberately modest — corpses should reward looting without
# trivializing economy. Coalition / Directorate / Homesteaders get a bandage and
# a ration on top of their basic kit; Looters carry junk for salvage;
# Wanderers carry almost nothing. Faction-specific high-tier kits
# (gunsmith, drug-making) are NOT in baseline loadouts — those drop
# from named NPCs / brain-driven encounters in a later slice.
#
# Add a new faction loadout: append a `[[loadouts]]` block. Add a new
# roll: append to its `rolls` array. Item ids must exist in items.toml.
# Unknown ids fail loud at startup so authoring errors don't ship.

[[loadouts]]
faction = "coalition"
rolls = [
    { id = "bandage", count = 2, chance = 1.0 },
    { id = "preserved_ration", count = 1, chance = 1.0 },
    { id = "metal_scrap", count = 1, chance = 0.5 },
]

