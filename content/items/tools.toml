# ---------- Toolkits & specialty kits (tiered tiered progression) ----------
#
# Shape: `tool = { specialty = "<axis>", tier = "<tier>" }`. Each kit marks
# one cell in the specialty × tier matrix — higher tiers satisfy every
# lower-tier requirement within the same specialty (an Expert Gunsmith
# Kit is accepted anywhere a Basic one is). Stacking two specialties
# requires two items; a single player can carry (or their crew can
# share, via CRAFTING_SHARE_RADIUS_M) a full toolkit loadout.
#
# Recipes reference these via `required_kit = { specialty = "...",
# min_tier = "..." }`. Actual per-tier recipe catalogs for weapons,
# armor, meds, etc., land incrementally as each system ships — this
# file stocks the kits so the system has a real target.
#
# General toolkit ladder — generic repairs + basic crafts.

[[items]]
id = "basic_toolkit"
name = "Basic Toolkit"
category = "tool"
weight = 2.0
stack_size = 1
tool = { specialty = "general", tier = "basic" }

[[items]]
id = "advanced_toolkit"
name = "Advanced Toolkit"
category = "tool"
weight = 3.5
stack_size = 1
tool = { specialty = "general", tier = "advanced" }

[[items]]
id = "expert_toolkit"
name = "Expert Toolkit"
category = "tool"
weight = 5.0
stack_size = 1
tool = { specialty = "general", tier = "expert" }

