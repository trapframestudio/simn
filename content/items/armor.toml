# ---------------------------------------------------------------
# Armor — wearables that reduce projectile damage by protection
# class. Loaded via `ItemDef::armor_config`. Paper-doll slots:
# `armor_vest` (plate carriers, exosuits, soft vests) and
# `head_gear` (helmets). The damage formula scans equipped armor
# for matches against the hit body part and takes the max
# protection_class.
# ---------------------------------------------------------------

[[items]]
id = "armor_soft_vest"
name = "Soft Kevlar Vest (Class II)"
category = "armor_vest"
weight = 3.5
stack_size = 1
size = { w = 3, h = 3 }
equip_slots = ["armor_vest"]

[items.armor_config]
protection_class = 1
coverage = ["torso"]

